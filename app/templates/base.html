<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Skill Matrix - Engineer Skill Assessment System{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div id="app">
        {% if not hide_navbar %}
        <nav id="main-header" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
            <div class="container-fluid container">
                <a class="navbar-brand fw-bold text-primary" href="/dashboard" id="brand-link">Skill Matrix</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0" id="nav-links">
                        {% block nav_links %}{% endblock %}
                    </ul>
                    <div class="d-flex align-items-center">
                        <span class="navbar-text me-3 fw-semibold text-light" id="current-username"></span>
                        <button class="btn btn-outline-info btn-sm me-2" data-bs-toggle="modal" data-bs-target="#changePwdModal">Change Password</button>
                        <button id="logout-btn" class="btn btn-outline-light btn-sm">Logout</button>
                    </div>
                </div>
            </div>
        </nav>
        {% endif %}

        <main id="main-content" class="container mt-4 mb-5">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Global Modals -->
    <!-- Change Password Modal (Self) -->
    <div class="modal fade" id="changePwdModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold">Change Password</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="change-pwd-form">
                        <div class="mb-3">
                            <label class="form-label required fw-semibold">Current Password</label>
                            <input type="password" class="form-control" id="current-self-pwd" placeholder="Enter current password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label required fw-semibold">New Password</label>
                            <input type="password" class="form-control" id="new-self-pwd" placeholder="Enter new password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label required fw-semibold">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirm-self-pwd" placeholder="Re-enter new password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-2">Confirm Change</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Reset Password Modal (Leader Only) -->
    <div class="modal fade" id="resetPwdModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold">Reset Password for <span id="reset-pwd-username"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="reset-pwd-form">
                        <div class="mb-3">
                            <label class="form-label required fw-semibold">Enter New Password</label>
                            <input type="password" class="form-control" id="new-target-pwd" placeholder="Enter password to assign" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 mt-2">Force Reset Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom API JS -->
    <script src="/static/js/api.js"></script>
    <script>
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-custom show';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function escapeHtml(unsafe) {
            return (unsafe||'').toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const path = window.location.pathname;

            if (!token && path !== '/login' && path !== '/') {
                window.location.href = '/login';
                return;
            }

            if (token) {
                try {
                    const res = await Api.getMe();
                    const user = res.user;
                    localStorage.setItem('user', JSON.stringify(user));

                    const userEl = document.getElementById('current-username');
                    if (userEl) {
                        userEl.textContent = `${user.username} (${user.role.toUpperCase()})`;
                    }

                    const brandEl = document.getElementById('brand-link');
                    if (brandEl) {
                        brandEl.href = user.role === 'leader' ? '/dashboard' : '/engineer';
                    }

                    const logoutBtn = document.getElementById('logout-btn');
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', () => {
                            localStorage.clear();
                            window.location.href = '/login';
                        });
                    }

                    const changeForm = document.getElementById('change-pwd-form');
                    if (changeForm) {
                        changeForm.addEventListener('submit', async (e) => {
                            e.preventDefault();
                            const currentPwd = document.getElementById('current-self-pwd').value;
                            const newPwd = document.getElementById('new-self-pwd').value;
                            const confirmPwd = document.getElementById('confirm-self-pwd').value;

                            if (newPwd !== confirmPwd) {
                                showToast('New passwords do not match');
                                return;
                            }

                            try {
                                await Api.changeMyPassword(currentPwd, newPwd);
                                showToast('Password updated successfully');
                                const modalEl = document.getElementById('changePwdModal');
                                if (modalEl) {
                                    const modal = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
                                    modal.hide();
                                }
                                document.getElementById('current-self-pwd').value = '';
                                document.getElementById('new-self-pwd').value = '';
                                document.getElementById('confirm-self-pwd').value = '';
                            } catch (err) {
                                showToast('Failed to update password: ' + err.message);
                            }
                        });
                    }
                } catch (e) {
                    if (path !== '/login' && path !== '/') {
                        localStorage.clear();
                        window.location.href = '/login';
                    }
                }
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
